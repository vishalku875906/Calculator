name: Generate sitemaps

on:
  push:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      - name: Install dependencies
        run: npm ci
      - name: Run sitemap generator
        run: node tools/generate-sitemaps.js
      - name: Commit sitemaps
        uses: stefanzweifel/git-auto-commit-action@v4
        with:
          commit_message: "chore: regenerate sitemaps"
          file_pattern: |
            sitemap.xml
            sitemap-pro-pages.xml
          branch: master
