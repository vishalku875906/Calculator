<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | Calculator Pro - Get Support & Feedback</title>
    <meta name="description" content="Have a question or suggestion? Contact Calculator Pro. We'd love to hear from you about our free online calculators.">
    <link rel="canonical" href="https://calculatorproai.com/contact.html">
    <meta property="og:title" content="Contact Calculator Pro">
    <link rel="stylesheet" href="/assets/styles-pro.css">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
</head>
<body data-theme="light">
    <header class="site-header">
        <div class="container">
            <div class="header-container">
                <a href="/" class="brand">Calculator Pro</a>
                <div class="header-search">
                    <input type="search" id="globalSearch" placeholder="Search calculators..." autocomplete="off">
                </div>
                <div class="header-actions">
                    <button class="theme-toggle" id="themeToggle">🌙</button>
                </div>
            </div>
        </div>
    </header>
    
    <main>
        <!-- Breadcrumbs -->
        <div class="container" style="padding: 24px 0;">
            <div class="breadcrumbs">
                <a href="/">Home</a>
                <span>→</span>
                <span>Contact</span>
            </div>
        </div>
        
        <!-- Hero -->
        <section style="padding: 60px 0; background: var(--primary-light);">
            <div class="container">
                <h1 style="margin-bottom: 20px;">Get In Touch</h1>
                <p style="font-size: 1.1rem;">Have questions, suggestions, or found a bug? We'd love to hear from you.</p>
            </div>
        </section>
        
        <!-- Contact Form -->
        <section class="section">
            <div class="container" style="max-width: 600px;">
                <div class="card">
                    <form onsubmit="handleSubmit(event)">
                        <div class="form-group">
                            <label class="form-label">Your Name *</label>
                            <input type="text" class="form-input" required>
                        </div>
                        
                        <div class="form-group">
                            <label class="form-label">Email Address *</label>
                            <input type="email" class="form-input" required>
                        </div>
                        
                        <div class="form-group">
                            <label class="form-label">Category</label>
                            <select class="form-select">
                                <option>General Inquiry</option>
                                <option>Bug Report</option>
                                <option>Feature Request</option>
                                <option>Partnership</option>
                                <option>Other</option>
                            </select>
                        </div>
                        
                        <div class="form-group">
                            <label class="form-label">Message *</label>
                            <textarea class="form-textarea" required></textarea>
                        </div>
                        
                        <button type="submit" class="button button-primary" style="width: 100%;">Send Message</button>
                    </form>
                </div>
                
                <!-- Contact Info -->
                <div style="margin-top: 40px; display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px;">
                    <div class="card">
                        <div style="font-size: 1.5rem; margin-bottom: 12px;">📧</div>
                        <h3 style="font-size: 1.1rem;">Email</h3>
                        <a href="mailto:support@calculatorpro.com">support@calculatorpro.com</a>
                    </div>
                    
                    <div class="card">
                        <div style="font-size: 1.5rem; margin-bottom: 12px;">🐦</div>
                        <h3 style="font-size: 1.1rem;">Twitter</h3>
                        <a href="https://twitter.com/calculatorpro" target="_blank">@calculatorpro</a>
                    </div>
                    
                    <div class="card">
                        <div style="font-size: 1.5rem; margin-bottom: 12px;">⏰</div>
                        <h3 style="font-size: 1.1rem;">Response Time</h3>
                        <p style="margin: 0; font-size: 14px;">24-48 hours</p>
                    </div>
                </div>
            </div>
        </section>
    </main>
    
    <footer class="site-footer">
        <div class="container">
            <div class="footer-bottom">
                <p>&copy; 2024 Calculator Pro. All rights reserved.</p>
            </div>
        </div>
    </footer>
    
    <script src="/assets/site.js" defer></script>
    <script>
        function handleSubmit(event) {
            event.preventDefault();
            alert('Thank you for your message! We will get back to you soon.');
            event.target.reset();
        }
    </script>
</body>
</html>
